<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    @media (prefers-color-scheme: dark) {
      .letter { fill: #ffffff; }
      .bg { fill: #1a1a1a; }
    }
    @media (prefers-color-scheme: light) {
      .letter { fill: #1a1a1a; }
      .bg { fill: #ffffff; }
    }
  </style>
  <rect class="bg" width="100" height="100" rx="20"/>
  <text class="letter" x="50" y="50" font-family="Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" dominant-baseline="central">B</text>
</svg>
